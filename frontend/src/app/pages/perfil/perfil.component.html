<div class="perfil">

  <div class="perfil__contenedor">

    <div class="perfil__contenido-superior">

      <div class="perfil__columna-foto">
        <div class="perfil__avatar-wrapper">
          <img class="perfil__foto-imagen" [src]="fotoUrl" alt="Foto de perfil" onerror="this.onerror=null; this.src='/assets/images/creativelogo.png';">
        </div>
        
        <input 
          #fileInput 
          type="file" 
          accept="image/*" 
          (change)="onFileSelected($event)" 
          style="display: none;">

        <button 
          class="perfil__boton-foto" 
          type="button" 
          (click)="fileInput.click()">
          Seleccionar archivo
        </button>

        <span class="perfil__texto-archivo">{{ nombreArchivo }}</span>
      </div>

      <form class="perfil__formulario" id="perfilForm">

        <div class="perfil__grupo-form">
          <label class="perfil__etiqueta" for="nombre">Nombre</label>
          <input class="perfil__entrada" type="text" id="nombre" name="nombre" required [(ngModel)]="usuario.nombre">
        </div>

        <div class="perfil__grupo-form">
          <label class="perfil__etiqueta" for="email">Correo electrónico</label>
          <input class="perfil__entrada" type="email" id="email" name="email" required autocomplete="username"
            [(ngModel)]="usuario.nombre_usuario" disabled>
        </div>

        <div class="perfil__grupo-form">
          <label class="perfil__etiqueta" for="pass-antigua">Contraseña actual</label>
          <div class="perfil__input-wrapper">
            <input 
              class="perfil__entrada perfil__entrada--con-icono" 
              [type]="mostrarPassActual ? 'text' : 'password'" 
              id="pass-antigua" 
              name="passwordActual" 
              required
              autocomplete="current-password" 
              [(ngModel)]="passActual">
            
            <img 
              [src]="mostrarPassActual ? '/assets/images/ver.svg' : '/assets/images/no-ver.svg'" 
              class="perfil__icono-pass"
              (click)="mostrarPassActual = !mostrarPassActual"
              alt="Mostrar/Ocultar contraseña">
          </div>
        </div>

        <h3 class="perfil__separador">Cambiar contraseña</h3>

        <div class="perfil__grupo-form">
          <label class="perfil__etiqueta" for="pass-nueva">Nueva contraseña</label>
          <div class="perfil__input-wrapper">
            <input 
              class="perfil__entrada perfil__entrada--con-icono" 
              [type]="mostrarPassNueva ? 'text' : 'password'" 
              id="pass-nueva" 
              name="passwordNueva"
              autocomplete="new-password" 
              [(ngModel)]="passNueva">
            
            <img 
              [src]="mostrarPassNueva ? '/assets/images/ver.svg' : '/assets/images/no-ver.svg'" 
              class="perfil__icono-pass"
              (click)="mostrarPassNueva = !mostrarPassNueva"
              alt="Mostrar/Ocultar contraseña">
          </div>
        </div>

        <div class="perfil__grupo-form">
          <label class="perfil__etiqueta" for="pass-confirma">Confirmar nueva contraseña</label>
          <div class="perfil__input-wrapper">
            <input 
              class="perfil__entrada perfil__entrada--con-icono" 
              [type]="mostrarPassConfirm ? 'text' : 'password'" 
              id="pass-confirma" 
              name="passwordConfirm"
              autocomplete="new-password" 
              [(ngModel)]="passConfirm">
            
            <img 
              [src]="mostrarPassConfirm ? '/assets/images/ver.svg' : '/assets/images/no-ver.svg'" 
              class="perfil__icono-pass"
              (click)="mostrarPassConfirm = !mostrarPassConfirm"
              alt="Mostrar/Ocultar contraseña">
          </div>
        </div>

      </form>
    </div>

    <div class="perfil__acciones">
      <button class="perfil__boton perfil__boton--logout" type="button" (click)="logout()">
        Cerrar Sesión
      </button>

      <button class="perfil__boton perfil__boton--actualizar" type="button" (click)="actualizarPerfil()">
        Actualizar perfil
      </button>
    </div>

  </div>
</div>
