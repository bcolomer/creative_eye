<div class="productos">
    <h1 class="productos__titulo">Catálogo de productos</h1>

    <div *ngIf="paginatedProductos.length > 0" class="productos__contenedor">
    
        <div *ngFor="let producto of paginatedProductos" class="productos__tarjeta" [routerLink]="['/producto', producto.producto_id]">
    
            <img 
                class="productos__tarjeta-imagen" 
                [src]="producto.foto" 
                alt="{{ producto.nombre }}">
    
            <h2 class="productos__tarjeta-titulo">{{ producto.nombre }}</h2>
    
            <p class="productos__tarjeta-precio">{{ producto.precio | number:'1.0-2'}} €</p>
    
        </div>
    </div>

    <div *ngIf="allProductos.length === 0" class="productos__mensaje-vacio">
        <p>Cargando productos...</p>
    </div>

    <div class="productos__paginacion" *ngIf="totalPages > 1">
        
        <button 
            class="productos__paginacion-btn" 
            (click)="prevPage()" 
            [disabled]="currentPage === 1">
            &laquo; Anterior
        </button>

        <button 
            *ngFor="let page of pagesArray"
            class="productos__paginacion-numero"
            [class.productos__paginacion-numero--activo]="page === currentPage"
            (click)="goToPage(page)">
            {{ page }}
        </button>

        <button 
            class="productos__paginacion-btn" 
            (click)="nextPage()" 
            [disabled]="currentPage === totalPages">
            Siguiente &raquo;
        </button>

    </div>

</div>
