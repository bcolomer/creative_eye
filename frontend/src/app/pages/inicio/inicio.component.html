<section class="hero">

  <video 
    #videoHero 
    class="hero__video" 
    autoplay 
    muted 
    loop 
    playsinline 
    poster="assets/images/hero-poster.jpg">
    
    <source src="/assets/video/inicio.mp4" type="video/mp4">
    Tu navegador no soporta videos HTML5.
  </video>

  <div class="hero__overlay"></div>

  <div class="hero__contenido" appParallax [ratio]="0.5">
    <h1 class="hero__titulo">Creative Eye</h1>

    <a [routerLink]="['/productos']" class="hero__boton">
      Ver Tienda
    </a>
  </div>

</section>
