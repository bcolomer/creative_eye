<header class="encabezado">
    <div class="encabezado__contenedor">
        
        <a [routerLink]="['/']" class="encabezado__marca">
        <span class="encabezado__titulo">Creative Eye</span>
        </a>

        <nav class="encabezado__nav">
        <ul class="encabezado__lista">
            <li class="encabezado__item">
            <a [routerLink]="['/']" routerLinkActive="encabezado__enlace--activo" [routerLinkActiveOptions]="{exact: true}" class="encabezado__enlace">Inicio</a>
            </li>
            <li class="encabezado__item">
            <a [routerLink]="['/productos']" routerLinkActive="encabezado__enlace--activo" class="encabezado__enlace">Tienda</a>
            </li>
            <li class="encabezado__item">
            <a [routerLink]="['/carrito']" routerLinkActive="encabezado__enlace--activo" class="encabezado__enlace">
                Carrito <span *ngIf="cartItemCount > 0" class="encabezado__contador">({{ cartItemCount }})</span>
            </a>
            </li>
            
            <li class="encabezado__item">
            <a [routerLink]="['/login']" routerLinkActive="encabezado__enlace--activo" class="encabezado__enlace">Login</a>
            </li>
            <li class="encabezado__item">
            <a [routerLink]="['/perfil']" routerLinkActive="encabezado__enlace--activo" class="encabezado__enlace encabezado__enlace--boton">Mi Perfil</a>
            </li>
        </ul>
        </nav>

    </div>
    </header>

<main class="contenedor-principal">
    <router-outlet></router-outlet>
</main>

<app-footer></app-footer>
