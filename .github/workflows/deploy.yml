name: Despliegue Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Conectando y Desplegando
      uses: appleboy/ssh-action@master
      with:
        host: creative-admin.duckdns.org
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. Ir a la carpeta del proyecto
          cd /var/www/proyectosintegrados-bcolomer/backend

          # 2. Descargar cambios de GitHub (usamos sudo por tema de permisos)
          sudo git pull origin main

          # 3. Instalar dependencias de PHP
          sudo composer install --no-interaction --prefer-dist --optimize-autoloader

          # 4. Correr migraciones de base de datos (si las hay)
          sudo php artisan migrate --force

          # 5. Limpiar y reconstruir caché de Laravel
          sudo php artisan optimize:clear
          sudo php artisan config:cache
          sudo php artisan route:cache
          sudo php artisan view:clear

          # 6. Reconstruir los archivos de diseño (CSS/JS)
          sudo npm install
          sudo npm run build

          # 7. Asegurar que el servidor web siga siendo el dueño de todo
          sudo chown -R www-data:www-data .